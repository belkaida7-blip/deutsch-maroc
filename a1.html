// ============================================================
// RENDER
// ============================================================
function getStorage(key) { try { return localStorage.getItem(key); } catch(e) { return null; } }
function setStorage(key, val) { try { localStorage.setItem(key, val); } catch(e) {} }

function updateProgress() {
  let done = 0, total = 0;
  units.forEach(u => u.lessons.forEach(l => {
    total++;
    if(getStorage('done_'+l.id)) done++;
  }));
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('total-progress').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${done} / ${total} درس مكتمل`;
}

function renderUnits() {
  const container = document.getElementById('units-container');
  container.innerHTML = units.map((unit, ui) => `
    <div class="unit" id="unit-${ui}">
      <div class="unit-header" onclick="toggleUnit(${ui})">
        <h2>${unit.title} <small style="opacity:.6;font-size:.8rem">(${unit.lessons.length} درس)</small></h2>
        <span class="unit-toggle">▾</span>
      </div>
      <div class="unit-body">
        <div class="lessons-list">
          ${unit.lessons.map(l => `
            <div class="lesson-card ${getStorage('done_'+l.id)?'done':''}" onclick="openLesson('${l.id}')">
              <div class="lesson-info">
                <h3>${l.title}</h3>
                <p>${l.sub}</p>
                <div class="lesson-tags">
                  ${l.types.map(t => `<span class="tag tag-${t}">${t==='audio'?'🎧 صوتي':t==='text'?'📖 نصي':'✏️ اختبار'}</span>`).join('')}
                </div>
              </div>
              <span class="lesson-status">${getStorage('done_'+l.id)?'✅':'○'}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function toggleUnit(ui) {
  const el = document.getElementById('unit-'+ui);
  el.classList.toggle('open');
}

function openLesson(id) {
  let lesson = null;
  units.forEach(u => u.lessons.forEach(l => { if(l.id===id) lesson=l; }));
  if(!lesson) return;
  document.getElementById('modal-title').textContent = `${lesson.title} — ${lesson.sub}`;
  const body = document.getElementById('modal-body');
  let html = '';

  // Audio Player
  if(lesson.types.includes('audio') && lesson.transcript.length > 0) {
    html += `
      <div class="section">
        <h3>🎧 درس صوتي</h3>
        <div class="audio-player">
          <div style="margin-bottom:8px;font-size:.9rem;opacity:.7">${lesson.title}</div>
          <div class="audio-controls">
            <button class="play-btn" id="playbtn-modal" onclick="togglePlay()">▶</button>
            <input type="range" class="audio-progress" id="prog-modal" value="0" min="0" max="100" oninput="seekAudio(this.value)">
          </div>
          <div class="speed-btns">
            <span style="font-size:.8rem;opacity:.7;margin-left:8px">السرعة:</span>
            <button class="speed-btn active" onclick="setSpeed(1,this)">1x</button>
            <button class="speed-btn" onclick="setSpeed(0.75,this)">0.75x</button>
            <button class="speed-btn" onclick="setSpeed(0.5,this)">0.5x</button>
          </div>
        </div>
      </div>`;
  }

  // Vocabulary
  if(lesson.vocab.length > 0) {
    html += `<div class="section"><h3>📚 المفردات</h3><div class="vocab-grid">
      ${lesson.vocab.map(v=>`<div class="vocab-card"><div class="vocab-de">${v.g?`<span style="font-size:.7rem;color:var(--gold)">${v.g}</span> `:''} ${v.de}</div><div class="vocab-ar">${v.ar}</div></div>`).join('')}
    </div></div>`;
  }

  // Transcript
  if(lesson.transcript.length > 0) {
    html += `<div class="section"><h3>🗣️ النص والحوار</h3><div class="transcript-list">
      ${lesson.transcript.map((t,i)=>`<div class="transcript-line" id="tline-${i}"><div class="transcript-de">${t.de}</div><div class="transcript-ar">${t.ar}</div></div>`).join('')}
    </div></div>`;
  }

  // Grammar
  if(lesson.grammar) {
    const g = lesson.grammar;
    const headers = g.headers || (g.table && g.table.headers) || [];
    const rows = g.rows || (g.table && g.table.rows) || [];
    html += `<div class="section"><h3>📖 القاعدة النحوية — ${g.title}</h3>
      <table class="grammar-table"><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
  }

  // Quiz
  if(lesson.quiz && lesson.quiz.length > 0) {
    html += `<div class="section"><h3>✏️ اختبار سريع</h3><div id="quiz-container">`;
    lesson.quiz.forEach((q,qi) => {
      html += `<div class="quiz-q" style="margin-top:${qi>0?'20px':'0'}">${qi+1}. ${q.q}</div>
        <div class="quiz-options">
          ${q.opts.map((opt,oi)=>`<button class="quiz-opt" onclick="checkAnswer(this,${oi},${q.ans},${qi})">${opt}</button>`).join('')}
        </div>`;
    });
    html += `</div></div>`;
  }

  html += `<button class="done-btn" onclick="markDone('${lesson.id}')">✅ تم — إكمال الدرس</button>`;
  body.innerHTML = html;

  // Setup audio
  if(lesson.types.includes('audio')) {
    setupAudio(lesson);
  }

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

let audioPlaying = false, audioLine = 0, audioSpeed = 1, audioLesson = null, audioUtterance = null;

function setupAudio(lesson) {
  audioLesson = lesson;
  audioPlaying = false;
  audioLine = 0;
}

function speakLine(idx) {
  if(!audioLesson || idx >= audioLesson.transcript.length) {
    audioPlaying = false;
    const btn = document.getElementById('playbtn-modal');
    if(btn) btn.textContent = '▶';
    return;
  }
  const text = audioLesson.transcript[idx].de;
  audioUtterance = new SpeechSynthesisUtterance(text);
  audioUtterance.lang = 'de-DE';
  audioUtterance.rate = audioSpeed;
  document.querySelectorAll('.transcript-line').forEach((el,i) => el.classList.toggle('active', i===idx));
  const prog = document.getElementById('prog-modal');
  if(prog) prog.value = (idx / audioLesson.transcript.length) * 100;
  audioUtterance.onend = () => { if(audioPlaying) { audioLine = idx+1; speakLine(idx+1); } };
  window.speechSynthesis.speak(audioUtterance);
}

window.togglePlay = function() {
  if(!audioPlaying) {
    audioPlaying = true;
    document.getElementById('playbtn-modal').textContent = '⏸';
    window.speechSynthesis.cancel();
    speakLine(audioLine);
  } else {
    audioPlaying = false;
    document.getElementById('playbtn-modal').textContent = '▶';
    window.speechSynthesis.cancel();
  }
};

window.setSpeed = function(s, btn) {
  audioSpeed = s;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
};

window.seekAudio = function(val) {
  if(!audioLesson) return;
  audioLine = Math.floor((val/100) * audioLesson.transcript.length);
  if(audioPlaying) { window.speechSynthesis.cancel(); speakLine(audioLine); }
};

function checkAnswer(btn, selected, correct, qi) {
  const opts = btn.parentElement.querySelectorAll('.quiz-opt');
  opts.forEach(o => o.disabled = true);
  if(selected === correct) {
    btn.classList.add('correct');
  } else {
    btn.classList.add('wrong');
    opts[correct].classList.add('correct');
  }
}

function markDone(id) {
  setStorage('done_'+id, '1');
  closeModal();
  renderUnits();
  updateProgress();
}

function closeModal() {
  audioPlaying = false;
  window.speechSynthesis.cancel();
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

// Init
renderUnits();
updateProgress();
// Open first unit by default
document.getElementById('unit-0').classList.add('open');
</script>
